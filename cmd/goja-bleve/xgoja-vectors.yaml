name: goja-bleve-vectors
appName: goja-bleve
go:
  tags:
    - vectors
  ldflags:
    - -r
    - /usr/local/lib
target:
  kind: xgoja
  output: dist/goja-bleve-vectors
packages:
  - id: goja-bleve
    import: github.com/go-go-golems/goja-bleve/pkg/xgoja/providers/bleve
    version: v0.0.0
    replace: ../..
  - id: go-go-goja-core
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
runtimes:
  main:
    modules:
      - package: goja-bleve
        name: bleve
        as: bleve
      - package: go-go-goja-core
        name: path
        as: path
      - package: go-go-goja-core
        name: yaml
        as: yaml
      - package: go-go-goja-host
        name: fs
        as: fs
        config:
          allow: true
commands:
  eval:
    enabled: true
    runtime: main
  run:
    enabled: true
    runtime: main
  repl:
    enabled: true
    runtime: main
  jsverbs:
    enabled: true
    runtime: main
    name: verbs
    mount: root
jsverbs:
  - id: goja-bleve-bundled-verbs
    path: ./jsverbs
    embed: true
